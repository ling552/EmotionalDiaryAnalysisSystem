{% extends 'base.html' %}

{% block title %}修改密码 · 情绪日记分析系统{% endblock %}

{% block content %}
  <div class="grid grid-2">
    <section class="card card-pad">
      <h1 class="page-title">修改密码</h1>
      <p class="page-sub">为了安全起见，请使用强密码并避免与其他平台重复。</p>

      <form method="post" class="grid">
        {% csrf_token %}

        <div>
          <label class="label" for="old_password">原密码</label>
          <input class="input" id="old_password" name="old_password" type="password" autocomplete="current-password" placeholder="请输入原密码" />
        </div>

        <div>
          <label class="label" for="new_password1">新密码</label>
          <input class="input" id="new_password1" name="new_password1" type="password" autocomplete="new-password" placeholder="请输入新密码" />
        </div>

        <div>
          <label class="label" for="new_password2">确认新密码</label>
          <input class="input" id="new_password2" name="new_password2" type="password" autocomplete="new-password" placeholder="再输入一次" />
        </div>

        <div class="actions" style="justify-content:flex-start">
          <button class="btn btn-primary" type="submit">保存密码</button>
          <a class="btn btn-soft" href="{% url 'profile' %}">返回</a>
        </div>
      </form>
    </section>

    <aside class="card card-pad">
      <h2 class="page-title" style="font-size:18px">建议</h2>
      <ul class="list">
        <li class="list-item">
          <div>
            <div class="list-title">长度与复杂度</div>
            <p class="list-meta">建议至少 8 位，包含字母、数字与符号。</p>
          </div>
          <span class="badge badge-blue">安全</span>
        </li>
        <li class="list-item">
          <div>
            <div class="list-title">避免复用</div>
            <p class="list-meta">不要与其他网站使用同一密码。</p>
          </div>
          <span class="badge badge-pink">重要</span>
        </li>
      </ul>
    </aside>
  </div>
{% endblock %}
